spring.application.name=secure-api
server.port=${SERVER_PORT:5000}

spring.datasource.url=${DB_URL:jdbc:h2:file:./data/secureappdb;AUTO_SERVER=TRUE}
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:8080,http://127.0.0.1:8080}
app.auth.token-ttl-hours=${APP_AUTH_TOKEN_TTL_HOURS:8}
